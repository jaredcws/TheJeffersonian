<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-label="The Jeffersonian">
  <defs>
    <style>
      .mark { fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .word { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; fill: currentColor; }
      .wmain { font-size: 23px; font-weight: 600; letter-spacing: 0.5px; }
      .wsub { font-family: 'Inter', system-ui, sans-serif; font-size: 8.2px; letter-spacing: 3.4px; fill: currentColor; opacity: 0.72; }
    </style>
  </defs>
  <!-- Building monogram mark -->
  <g class="mark">
    <path d="M10 50 V24 L26 12 L42 24 V50" />
    <path d="M6 50 H46" />
    <path d="M21 50 V36 H31 V50" />
    <line x1="26" y1="12" x2="26" y2="6" />
    <circle cx="26" cy="4" r="1.6" fill="currentColor" stroke="none" />
  </g>
  <text x="58" y="32" class="word wmain">The Jeffersonian</text>
  <text x="59" y="46" class="wsub">JEFFERSON · IOWA</text>
</svg>
